name: Release

# Build the Electron app (RPM + AppImage) and attach it to the GitHub Release
# when a v* tag is pushed (or run manually). The AppImage and latest-linux.yml
# update metadata are what electron-updater uses to auto-update installed apps.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install rpm tooling
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix web ci

      - name: Build frontend
        run: npm --prefix web run build

      - name: Build RPM + AppImage
        run: npx electron-builder --linux --publish never

      - name: List artifacts
        run: ls -la dist-electron

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist-electron/*.rpm
            dist-electron/*.AppImage
            dist-electron/latest-linux.yml
